name: Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/publish-docker.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "amper"
      - "module.yaml"
      - "src/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=statik
            org.opencontainers.image.description=Static site generator and hosted CMS in Kotlin

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          pull: true
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify tinyserve deploy token is set
        env:
          TINYSERVE_DEPLOY_TOKEN: ${{ secrets.TINYSERVE_DEPLOY_TOKEN }}
        run: |
          if [ -z "$TINYSERVE_DEPLOY_TOKEN" ]; then
            echo "Missing required secret: TINYSERVE_DEPLOY_TOKEN"
            exit 1
          fi

      - name: Deploy to tinyserve
        env:
          TINYSERVE_DEPLOY_TOKEN: ${{ secrets.TINYSERVE_DEPLOY_TOKEN }}
        run: |
          curl -X POST "https://api.tinyserve.org/webhook/deploy/statik-cms?timeout=240" \
            -H "Authorization: Bearer $TINYSERVE_DEPLOY_TOKEN" \
            --fail-with-body
