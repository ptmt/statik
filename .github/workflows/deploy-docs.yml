name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'documentation/**'
      - 'src/**'
      - 'module.yaml'
      - 'amper'
  pull_request:
    branches: [ main ]
    paths:
      - 'documentation/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Amper dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Amper
            ~/.cache/JetBrains/Amper
          key: ${{ runner.os }}-amper-${{ hashFiles('amper', 'module.yaml') }}
          restore-keys: |
            ${{ runner.os }}-amper-

      - name: Make amper executable
        run: chmod +x ./amper

      - name: Build Statik
        run: |
          for attempt in 1 2 3; do
            ./amper build && exit 0
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep $((attempt * 30))
          done

      - name: Run tests
        run: |
          for attempt in 1 2 3; do
            ./amper test && exit 0
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep $((attempt * 30))
          done

      - name: Generate documentation site
        run: ./amper run -- --root-path=./documentation

      - name: Setup Pages
        uses: actions/configure-pages@v4
        if: github.ref == 'refs/heads/main'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main'
        with:
          path: './documentation/docs'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
